sonar.projectKey=core_php
sonar.projectName=core/php
sonar.sources=.
sonar.exclusions=**/vendor/**,**/third_party/**,**/.tmp/**,**/gomodcache/**,**/node_modules/**,**/dist/**,**/build/**,**/*_test.go,**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js
sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js
sonar.test.exclusions=**/vendor/**,**/third_party/**,**/.tmp/**,**/gomodcache/**,**/node_modules/**,**/dist/**,**/build/**

# Blade-specific rule suppressions — Blade components are rendered by parent
# context that Sonar's per-file HTML analysis can't see.
sonar.issue.ignore.multicriteria=blade-li-context,blade-page-title,blade-form-id-shadowing
sonar.issue.ignore.multicriteria.blade-li-context.ruleKey=Web:ItemTagNotWithinContainerTagCheck
sonar.issue.ignore.multicriteria.blade-li-context.resourceKey=**/Blade/components/nav-*.blade.php
sonar.issue.ignore.multicriteria.blade-page-title.ruleKey=Web:PageWithoutTitleCheck
sonar.issue.ignore.multicriteria.blade-page-title.resourceKey=**/Blade/layouts/**.blade.php
sonar.issue.ignore.multicriteria.blade-form-id-shadowing.ruleKey=Web:S7930
sonar.issue.ignore.multicriteria.blade-form-id-shadowing.resourceKey=**/Blade/forms/**.blade.php
